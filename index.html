<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-container">
        <div id="sidebar">
            <img src="form image.avif" alt="a fern backdrop">
            <img src="odin.png.png" alt="The Odin Project Logo">
        </div>
        <div id="main-content">
            <h1>This is not a real online service! You know you need something like 
                this in your life to help you realize your deepest dreams. Sign up now to get started.
            </h1>
            <p>You know you want to.</p>
            <div id="form">

                <p>Let's do this!</p>

                <label for="first-name">FIRST NAME</label>
                <input type="text" id="first-name" name="first-name" placeholder="Thor">

                <label for="last-name">LAST NAME</label>
                <input type="text" id="last-name" name="last-name" placeholder="Odinson">

                <label for="user-email">EMAIL</label>
                <input type="email" id="user-email" name="user-email">

                <label for="phone-number">PHONE NUMBER</label>
                <input type="tel" id="phone-number" name="phone-number">

                <label for="user-password">PASSWORD</label>
                <input type="password" id="user-password" name="password">

                <label for="confirm-password">CONFIRM PASSWORD</label>
                <input type="password" id="confirm-password" name="confirm-password">
            </div>
            <button>Create Account</button>       
            <p>Already have an account? <a href="#">Log in</a></p>
        </div>
    </div>
</body>
</html>
